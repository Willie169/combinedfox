name: user-overrides-js

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - ".github/workflows/user-overrides-js.yml"
      - "arkenfox-overrides.js"
      - "Peskyfox-overrides.js"
      - "extra-overrides.js"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: user-overrides-js
        run: |
          wget https://github.com/yokoffing/Betterfox/raw/refs/heads/main/Peskyfox.js
          cat Peskyfox.js arkenfox-overrides.js Peskyfox-overrides.js extra-overrides.js > user-overrides.js
          rm Peskyfox.js
      - name: Commit and push changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$(date -u --iso-8601=seconds)"
          git push
